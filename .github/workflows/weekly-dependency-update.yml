name: Weekly Dependency Security Update

on:
    schedule:
        - cron: '0 9 * * 1' # Every Monday at 9am UTC
    workflow_dispatch: # Allow manual triggering

jobs:
    audit-fix:
        runs-on: ubuntu-latest
        permissions:
            contents: write
            pull-requests: write

        steps:
            - name: Checkout code
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: '23.x'

            - name: Create branch
              run: |
                  DATE=$(date +%Y-%m-%d)
                  BRANCH="fix/update-dependencies-${DATE}"
                  git checkout -b "$BRANCH"
                  echo "BRANCH=$BRANCH" >> $GITHUB_ENV

            - name: Run npm audit fix on frontend
              working-directory: ./frontend
              run: |
                  npm install
                  npm audit fix > ../frontend-audit.log || true

            - name: Run npm audit fix on backend
              working-directory: ./backend
              run: |
                  npm install
                  npm audit fix > ../backend-audit.log || true

            - name: Generate Summary
              id: generate_summary
              run: |
                  {
                    echo "pr_summary<<EOF"
                    echo "### Audit Results"
                    echo "#### Frontend"
                    tail -n 5 frontend-audit.log || echo "No audit data"
                    echo "#### Backend"
                    tail -n 5 backend-audit.log || echo "No audit data"
                    echo ""
                    echo "### Package.json Changes"
                    CHANGES=$(git diff -U0 **/package.json | grep '^[+-][^+-]' | grep -v '"version":' || true)
                    if [ -z "$CHANGES" ]; then
                      echo "No direct dependency changes in package.json (only lockfile updated)."
                    else
                      echo "\`\`\`diff"
                      echo "$CHANGES"
                      echo "\`\`\`"
                    fi
                    echo "EOF"
                  } >> "$GITHUB_OUTPUT"

            - name: Check for changes
              id: check_changes
              run: |
                  git diff --quiet && echo "changed=false" >> $GITHUB_OUTPUT || echo "changed=true" >> $GITHUB_OUTPUT

            - name: Commit changes
              if: steps.check_changes.outputs.changed == 'true'
              run: |
                  git config user.name "github-actions[bot]"
                  git config user.email "github-actions[bot]@users.noreply.github.com"
                  git add frontend/package.json frontend/package-lock.json backend/package.json backend/package-lock.json
                  git commit -m "chore: weekly npm audit fix for frontend and backend"

            - name: Push branch
              if: steps.check_changes.outputs.changed == 'true'
              run: git push -u origin "$BRANCH"

            - name: Create Pull Request
              if: steps.check_changes.outputs.changed == 'true'
              env:
                  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
                  PR_BODY: ${{ steps.generate_summary.outputs.pr_summary }}
              run: |
                  gh pr create \
                    --title "chore: weekly dependency security update $(date +%Y-%m-%d)" \
                    --body "## Weekly Dependency Security Update

                  This PR was automatically generated by the weekly dependency update workflow.

                  $PR_BODY

                  ### Review
                  Please review the updated \`package.json\` and \`package-lock.json\` files before merging." \
                    --base main \
                    --head "$BRANCH"

            - name: No changes found
              if: steps.check_changes.outputs.changed == 'false'
              run: echo "No dependency vulnerabilities found that could be auto-fixed. No PR created."